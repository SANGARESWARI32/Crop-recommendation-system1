<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Query - CropSmart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">🌱 CropSmart</div>
        <nav class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
            <a href="query.html" class="active"><i class="fas fa-question-circle"></i> Query</a>
        </nav>
    </header>

    <main class="main-container">
        <div class="glass-card query-page">
            <h1><i class="fas fa-paper-plane"></i> Ask Your Query</h1>
            
            <form id="queryForm" onsubmit="submitQuery(event)">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Your Name *</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email *</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="phone" placeholder="+1 234 567 8900">
                    </div>
                </div>

                <div class="form-group">
                    <label for="queryType"><i class="fas fa-tag"></i> Query Type *</label>
                    <select id="queryType" required>
                        <option value="">— Select Query Type —</option>
                        <option value="crop">Crop Recommendation</option>
                        <option value="soil">Soil Related</option>
                        <option value="weather">Weather Data</option>
                        <option value="technical">Technical Support</option>
                        <option value="billing">Billing / Subscription</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="subject"><i class="fas fa-heading"></i> Subject *</label>
                    <input type="text" id="subject" placeholder="Brief subject of your query" required>
                </div>

                <div class="form-group">
                    <label for="message"><i class="fas fa-comment"></i> Your Message *</label>
                    <textarea id="message" rows="6" placeholder="Describe your query in detail..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="attachment"><i class="fas fa-paperclip"></i> Attachment (Optional)</label>
                    <input type="file" id="attachment" accept=".jpg,.png,.pdf,.doc,.docx">
                    <small class="file-hint">Allowed: JPG, PNG, PDF, DOC (Max 5MB)</small>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="urgent">
                    <label for="urgent"><i class="fas fa-exclamation-triangle"></i> Mark as urgent</label>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="copyMe">
                    <label for="copyMe"><i class="fas fa-copy"></i> Send a copy to my email</label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-paper-plane"></i> Submit Query
                    </button>
                    <button type="reset" class="reset-btn">
                        <i class="fas fa-undo"></i> Reset Form
                    </button>
                </div>
            </form>

            <!-- Success Message (hidden by default) -->
            <div id="successMessage" class="success-message" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <h3>Query Submitted Successfully!</h3>
                <p>We'll get back to you within 24 hours.</p>
                <button onclick="resetForm()" class="new-query-btn">
                    <i class="fas fa-plus"></i> New Query
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
